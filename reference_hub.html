<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angles of the Ancient Astronomers - Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #05050a;
            color: #ffffff;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }
        .interactive {
            pointer-events: auto; /* Re-enable pointer events for UI elements */
        }
        header h1 {
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        header p {
            font-size: 14px;
            opacity: 0.7;
        }
        #main-interface {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
        }
        #level-menu {
            background: rgba(10, 10, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            width: 320px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .level-btn {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .level-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
        }
        .level-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            font-weight: bold;
        }
        .level-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #panel-briefing {
            background: rgba(10, 10, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 25px;
            width: 400px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #briefing-title {
            font-size: 20px;
            font-weight: 600;
        }
        #briefing-text {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.8;
            min-height: 80px;
        }
        #launch-btn {
            background: #ffffff;
            color: #05050a;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        #launch-btn:hover {
            background: #e0e0e0;
        }
        #game-level-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #game-level-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .back-hub-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <header class="interactive">
            <h1>AAA</h1>
            <p>Angles of the Ancient Astronomers</p>
        </header>

        <div id="main-interface">
            <div id="level-menu" class="interactive">
                <button class="level-btn active" data-level="0">Overview Screen</button>
                <button class="level-btn" data-level="1">Level 1: Eratosthenes</button>
                <button class="level-btn" data-level="2" disabled>Level 2: Aristarchus</button>
                <button class="level-btn" data-level="3" disabled>Level 3: Ptolemy</button>
                <button class="level-btn" data-level="4" disabled>Level 4: Kepler</button>
                <button class="level-btn" data-level="5" disabled>Level 5: Transit of Venus</button>
            </div>

            <div id="panel-briefing" class="interactive">
                <div id="briefing-title">Solar System Overview</div>
                <div id="briefing-text">Select a historical mission from the tracker menu to analyze how ancient astronomers calculated the mathematics of our cosmos.</div>
                <button id="launch-btn" style="display: none;">Launch Core Puzzle</button>
            </div>
        </div>
    </div>

    <div id="game-level-overlay">
        <button class="back-hub-btn" id="btn-exit-level">← Return to Hub</button>
        <div id="level-content-root" style="color: white; font-size: 24px;">
            [ 2D Geometry Sandbox Active ]
        </div>
    </div>

    <script>
        // --- 1. GLOBAL GAME STATE MANAGEMENT ---
        const GameState = {
            currentLevel: 0, 
            unlockedLevels: [0, 1], // Level 0 is Overview, Level 1 is unlocked by default
            levelData: {
                0: { title: "Solar System Hub", target: "system", text: "Select a historical mission from the tracker menu to analyze how ancient astronomers calculated the mathematics of our cosmos." },
                1: { title: "Eratosthenes' Measurement", target: "earth", text: "Calculate the precise circumference of the Earth using alternating interior angles and solar shadow cast lengths in Alexandria." },
                2: { title: "Aristarchus' Ratio", target: "moon", text: "Measure the curvature of Earth's shadow during a lunar eclipse to deduce the relative size of the Moon and distance to the Sun." },
                3: { title: "Ptolemy's Diurnal Parallax", target: "earth", text: "Leverage Earth's structural rotation to calculate the parallax angle of the Moon relative to the absolute center of the Earth." },
                4: { title: "Kepler's Empirical Orbits", target: "system", text: "Analyze Tycho Brahe's raw observational positional markers to verify that planetary orbits adhere to the ratio P² ∝ a³." },
                5: { title: "The Transit of Venus", target: "venus", text: "Cross-reference transit observation recordings across global stations to deduce the true distance of 1 Astronomical Unit in kilometers." }
            }
        };

        // --- 2. THREE.JS RIG CONFIGURATION ---
        let scene, camera, renderer;
        let celestialBodies = {};
        let cameraTargetPosition = new THREE.Vector3(0, 45, 85);
        let cameraLookAtTarget = new THREE.Vector3(0, 0, 0);
        let currentLookAt = new THREE.Vector3(0, 0, 0);

        function initHub() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(cameraTargetPosition);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting Setup
            const ambientLight = new THREE.AmbientLight(0x333344);
            scene.add(ambientLight);

            const sunLight = new THREE.PointLight(0xffffff, 2, 300);
            scene.add(sunLight);

            buildSolarSystem();
            setupUIEventListeners();
            animate();
        }

        // --- 3. BUILD THE CELESTIAL ENVIRONMENT ---
        function buildSolarSystem() {
            // Sun Configuration
            const sunGeo = new THREE.SphereGeometry(6, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const sunMesh = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sunMesh);
            celestialBodies['sun'] = sunMesh;

            // Definition layout for required system parameters
            const configuration = [
                { name: 'mercury', radius: 0.6, distance: 12, speed: 0.03, color: 0x888888 },
                { name: 'venus', radius: 1.2, distance: 18, speed: 0.02, color: 0xe3bb76 },
                { name: 'earth', radius: 1.4, distance: 26, speed: 0.015, color: 0x2277ff },
                { name: 'mars', radius: 0.9, distance: 34, speed: 0.01, color: 0xcc4422 }
            ];

            configuration.forEach(config => {
                // Orbit Path Graphic Loop
                const orbitGeo = new THREE.BufferGeometry();
                const points = [];
                for(let i = 0; i <= 64; i++) {
                    let theta = (i / 64) * Math.PI * 2;
                    points.push(new THREE.Vector3(Math.cos(theta) * config.distance, 0, Math.sin(theta) * config.distance));
                }
                orbitGeo.setFromPoints(points);
                const orbitMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.05, transparent: true });
                const orbitLine = new THREE.Line(orbitGeo, orbitMat);
                scene.add(orbitLine);

                // Planet Mesh Configuration
                const geo = new THREE.SphereGeometry(config.radius, 32, 32);
                const mat = new THREE.MeshStandardMaterial({ color: config.color, roughness: 0.8 });
                const mesh = new THREE.Mesh(geo, mat);
                
                scene.add(mesh);
                celestialBodies[config.name] = {
                    mesh: mesh,
                    distance: config.distance,
                    speed: config.speed,
                    angle: Math.random() * Math.PI * 2
                };
            });

            // Special Addon: Add Moon to Earth Setup
            const moonGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const moonMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
            const moonMesh = new THREE.Mesh(moonGeo, moonMat);
            scene.add(moonMesh);
            celestialBodies['moon'] = { mesh: moonMesh };
        }

        // --- 4. ENGINE ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Orbit Update Math Loops
            Object.keys(celestialBodies).forEach(key => {
                const body = celestialBodies[key];
                if (body.distance) {
                    body.angle += body.speed;
                    body.mesh.position.x = Math.cos(body.angle) * body.distance;
                    body.mesh.position.z = Math.sin(body.angle) * body.distance;
                }
            });

            // Lock Moon configuration relative to Earth position coordinates
            if(celestialBodies['earth'] && celestialBodies['moon']) {
                const earthPos = celestialBodies['earth'].mesh.position;
                const time = Date.now() * 0.003;
                celestialBodies['moon'].mesh.position.set(
                    earthPos.x + Math.cos(time) * 3,
                    earthPos.y,
                    earthPos.z + Math.sin(time) * 3
                );
            }

            // Camera Target Vector Rig Updates via Lerp interpolation tracking
            let activeTargetLook = new THREE.Vector3(0,0,0);
            const activeLevelKey = GameState.currentLevel;
            const targetFocusString = GameState.levelData[activeLevelKey].target;

            if (targetFocusString === "system") {
                cameraTargetPosition.set(0, 45, 85);
                activeTargetLook.set(0, 0, 0);
            } else if (celestialBodies[targetFocusString]) {
                const targetMesh = celestialBodies[targetFocusString].mesh;
                cameraTargetPosition.set(targetMesh.position.x + 5, targetMesh.position.y + 4, targetMesh.position.z + 10);
                activeTargetLook.copy(targetMesh.position);
            }

            camera.position.lerp(cameraTargetPosition, 0.05);
            currentLookAt.lerp(activeTargetLook, 0.05);
            camera.lookAt(currentLookAt);

            renderer.render(scene, camera);
        }

        // --- 5. INTERACTIVE INTERFACE INTERACTION HANDLING ---
        function setupUIEventListeners() {
            const buttons = document.querySelectorAll('.level-btn');
            const bTitle = document.getElementById('briefing-title');
            const bText = document.getElementById('briefing-text');
            const launchBtn = document.getElementById('launch-btn');

            buttons.forEach(btn => {
                const lvlIdx = parseInt(btn.getAttribute('data-level'));
                
                // Toggle accessibility lock based on global inventory context state
                if (GameState.unlockedLevels.includes(lvlIdx)) {
                    btn.removeAttribute('disabled');
                }

                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    GameState.currentLevel = lvlIdx;
                    
                    // Dynamic briefing content assignment interface values
                    const info = GameState.levelData[lvlIdx];
                    bTitle.innerText = info.title;
                    bText.innerText = info.text;

                    // Display level entry engine action control link if not main overview hub
                    launchBtn.style.display = lvlIdx === 0 ? 'none' : 'block';
                });
            });

            launchBtn.addEventListener('click', () => {
                enterLevelCanvasEnvironment(GameState.currentLevel);
            });

            document.getElementById('btn-exit-level').addEventListener('click', () => {
                exitLevelCanvasEnvironment();
            });
        }

        function enterLevelCanvasEnvironment(levelId) {
            const overlay = document.getElementById('game-level-overlay');
            const contentRoot = document.getElementById('level-content-root');
            overlay.classList.add('active');
            
            contentRoot.innerHTML = `
                <div style="text-align: center;">
                    <h2>Executing Level ${levelId}: ${GameState.levelData[levelId].title}</h2>
                    <p style="font-size: 16px; margin-top: 15px; opacity:0.7;">
                        [Insert specialized level interaction layout logic target here]
                    </p>
                </div>
            `;
        }

        function exitLevelCanvasEnvironment() {
            document.getElementById('game-level-overlay').classList.remove('active');
            
            // Advance progress system sequence on mock level finish validation sequence
            if (GameState.currentLevel === 1 && !GameState.unlockedLevels.includes(2)) {
                GameState.unlockedLevels.push(2);
                const nextLvlBtn = document.querySelector('.level-btn[data-level="2"]');
                if(nextLvlBtn) nextLvlBtn.removeAttribute('disabled');
            }
        }

        // Window resize layout structural tracking adjustment
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize script system state stack on load window execution call
        window.onload = initHub;
    </script>
</body>
</html>
